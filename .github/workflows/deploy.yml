name: CI Code Checker

on:
  push:
    branches: [ main ]

jobs:
  test-code:
    runs-on: ubuntu-latest
    steps:
      - name: Get the Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Syntax Checker
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # This checks for fatal Python errors and stops deployment if it finds one
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics